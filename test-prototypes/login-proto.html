<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="description" content="Protótipo de login com design moderno e glassmorphism">
  <title>Login — Protótipo</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      font-family: 'Segoe UI', sans-serif;
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
    }
    .card {
      background: rgba(255,255,255,0.15);
      backdrop-filter: blur(12px);
      border-radius: 16px;
      padding: 48px 40px;
      width: 380px;
      border: 1px solid rgba(255,255,255,0.2);
      box-shadow: 0 8px 32px rgba(0,0,0,0.2);
    }
    h1 { color: #fff; font-size: 1.8rem; margin-bottom: 8px; }
    p { color: rgba(255,255,255,0.7); margin-bottom: 24px; font-size: 0.9rem; }
    input {
      width: 100%; padding: 12px 16px; border: 1px solid rgba(255,255,255,0.3);
      background: rgba(255,255,255,0.1); border-radius: 8px; color: #fff;
      font-size: 0.95rem; margin-bottom: 16px; outline: none;
    }
    input::placeholder { color: rgba(255,255,255,0.5); }
    input:focus { border-color: #fff; background: rgba(255,255,255,0.15); }
    button {
      width: 100%; padding: 12px; border: none; border-radius: 8px;
      background: #fff; color: #764ba2; font-size: 1rem; font-weight: 600;
      cursor: pointer; transition: transform 0.15s;
    }
    button:hover { transform: scale(1.02); }
  </style>
</head>
<body>
  <div class="card">
    <h1>Entrar</h1>
    <p>Acesse sua conta para continuar</p>
    <input type="email" placeholder="Email">
    <input type="password" placeholder="Senha">
    <button>Login</button>
  </div>
</body>
</html>

<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="description" content="Dashboard com cards de métricas e gráficos simples">
  <title>Dashboard — Métricas</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      font-family: 'Segoe UI', sans-serif;
      background: #0f172a; color: #e2e8f0;
      min-height: 100vh; padding: 32px;
    }
    h1 { font-size: 1.5rem; margin-bottom: 24px; }
    .grid { display: grid; grid-template-columns: repeat(3, 1fr); gap: 20px; margin-bottom: 32px; }
    .card {
      background: #1e293b; border-radius: 12px; padding: 24px;
      border: 1px solid #334155;
    }
    .card-label { font-size: 0.8rem; color: #94a3b8; text-transform: uppercase; margin-bottom: 8px; }
    .card-value { font-size: 2rem; font-weight: 700; }
    .card-value.green { color: #4ade80; }
    .card-value.blue { color: #60a5fa; }
    .card-value.amber { color: #fbbf24; }
    .card-change { font-size: 0.8rem; color: #4ade80; margin-top: 4px; }
    .chart-area {
      background: #1e293b; border-radius: 12px; padding: 24px;
      border: 1px solid #334155; height: 200px;
      display: flex; align-items: flex-end; gap: 8px;
    }
    .bar {
      flex: 1; background: linear-gradient(to top, #3b82f6, #60a5fa);
      border-radius: 4px 4px 0 0; transition: height 0.3s;
    }
  </style>
</head>
<body>
  <h1>📊 Dashboard</h1>
  <div class="grid">
    <div class="card">
      <div class="card-label">Usuários Ativos</div>
      <div class="card-value green">2,847</div>
      <div class="card-change">↑ 12.5%</div>
    </div>
    <div class="card">
      <div class="card-label">Receita Mensal</div>
      <div class="card-value blue">R$ 48.2k</div>
      <div class="card-change">↑ 8.3%</div>
    </div>
    <div class="card">
      <div class="card-label">Tickets Abertos</div>
      <div class="card-value amber">156</div>
      <div class="card-change" style="color:#fbbf24">→ estável</div>
    </div>
  </div>
  <div class="chart-area">
    <div class="bar" style="height:40%"></div>
    <div class="bar" style="height:65%"></div>
    <div class="bar" style="height:50%"></div>
    <div class="bar" style="height:80%"></div>
    <div class="bar" style="height:55%"></div>
    <div class="bar" style="height:90%"></div>
    <div class="bar" style="height:70%"></div>
    <div class="bar" style="height:85%"></div>
    <div class="bar" style="height:60%"></div>
    <div class="bar" style="height:95%"></div>
    <div class="bar" style="height:75%"></div>
    <div class="bar" style="height:45%"></div>
  </div>
</body>
</html>
